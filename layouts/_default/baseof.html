<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{ .Site.Title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ .Site.Params.description }}">
    <meta name="author" content="{{ .Site.Params.author }}">
    <link rel="stylesheet" href="/stylesheets/application.css" media="all">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:400,900" media="all">
    <script src="/javascripts/html5.js"></script>
    <link rel="icon" href="/assets/ico/favicon.ico">
    <link rel="apple-touch-icon-precomposed" sizes="144x144" href="/assets/ico/apple-touch-icon-144x144-precomposed.png">
    <link rel="apple-touch-icon-precomposed" sizes="114x114" href="/assets/ico/apple-touch-icon-114x114-precomposed.png">
    <link rel="apple-touch-icon-precomposed" sizes="72x72" href="/assets/ico/apple-touch-icon-72x72-precomposed.png">
    <link rel="apple-touch-icon-precomposed" href="/assets/ico/apple-touch-icon-precomposed.png">
    <link rel="author" href="https://plus.google.com/u/0/112681783906373636049">
  </head>
  <body>
    {{ partial "header.html" . }}
    {{ block "main" . }}{{ end }}

    <script src="https://code.jquery.com/jquery-2.1.1.min.js" type="text/javascript"></script>
    <script src="/javascripts/application.js" type="text/javascript"></script>
    <script type="text/javascript">
      // Google analytics
      var _gaq = _gaq || [];
      _gaq.push(['_setAccount', 'UA-11110028-1']);
      _gaq.push(['_trackPageview']);

      (function() {
        var ga = document.createElement('script'); ga.type = 'text/javascript'; ga.async = true;
        ga.src = ('https://ssl.google-analytics.com/ga.js');
        var s = document.getElementsByTagName('script')[0]; s.parentNode.insertBefore(ga, s);
      })();
      // Appcache brute-force refresh
      if (window.applicationCache) {
        applicationCache.addEventListener('updateready', function() {
          window.location.reload();
        });
      }
    </script>
  </body>
</html>
